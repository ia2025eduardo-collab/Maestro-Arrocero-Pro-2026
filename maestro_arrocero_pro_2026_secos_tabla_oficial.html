let current=null;
const q=document.getElementById('q'),cat=document.getElementById('cat'),grid=document.getElementById('grid'),n=document.getElementById('n'),empty=document.getElementById('empty');
[...new Set(recipes.map(r=>r.cat))].sort().forEach(c=>cat.insertAdjacentHTML('beforeend',`<option>${c}</option>`));
function render(){let query=q.value.toLowerCase().trim(), c=cat.value;let arr=recipes.filter(r=>(c==='all'||r.cat===c)&&[r.title,r.cat,r.type,r.desc].join(' ').toLowerCase().includes(query));n.textContent=arr.length;empty.style.display=arr.length?'none':'block';grid.innerHTML=arr.map(r=>`<article class="card" onclick="openRecipe(${r.num})"><div class="pic"><span>${r.emoji}</span><b class="badge">${String(r.num).padStart(2,'0')}</b><span class="cat">${r.cat}</span></div><div class="cardBody"><h3>${r.title}</h3><p>${r.desc}</p><div class="meta"><span>⏱ ${r.time}</span><span>🔥 ${r.diff}</span><span>🍚 ${r.type}</span></div></div></article>`).join('')}
q.oninput=render;cat.onchange=render;render();
function openRecipe(num){current=recipes.find(r=>r.num===num);document.getElementById('home').classList.add('off');document.getElementById('detail').classList.add('on');document.getElementById('barTitle').textContent=current.title;document.getElementById('dTitle').textContent=current.title;document.getElementById('dEmoji').textContent=current.emoji;document.getElementById('desc').textContent=current.desc;document.getElementById('serv').max=current.max||100;document.getElementById('serv').value=Math.min(4,current.max||100);document.getElementById('chips').innerHTML=`<span class="chip">${current.cat}</span><span class="chip">${current.type}</span><span class="chip">${current.time}</span><span class="chip">${current.diff}</span>`;updateCalc();scrollTo(0,0)}
function goHome(){document.getElementById('detail').classList.remove('on');document.getElementById('home').classList.remove('off');current=null;scrollTo(0,0)}
function changeServ(d){let inp=document.getElementById('serv');let max=+(inp.max||100);inp.value=Math.min(max,Math.max(1,+(inp.value||1)+d));updateCalc()}
document.getElementById('serv').addEventListener('input',function(){this.value=this.value.replace(/[^0-9]/g,'');if(this.value==='')return;let v=parseInt(this.value,10);if(v<1)v=1;if(v>100)v=100;this.value=v;updateCalc();});document.getElementById('heat').addEventListener('change',updateCalc);document.getElementById('rice').addEventListener('change',updateCalc);
function fmt(v,u){if(u==='g'&&v>=1000)return (v/1000).toLocaleString('es-ES',{maximumFractionDigits:2})+' kg';if(u==='ml'&&v>=1000)return (v/1000).toLocaleString('es-ES',{maximumFractionDigits:2})+' L';if(['hebras','ud','dientes','hoja','ramita','muslo'].includes(u))return (Math.round(v*100)/100).toLocaleString('es-ES')+' '+u;return (Math.round(v*10)/10).toLocaleString('es-ES')+' '+u}

function filaPaellaValenciana(serv){
  const s = Math.max(1, Math.min(100, parseInt(serv || 1, 10)));
  let mejor = PAELLA_VALENCIANA_TABLA[0];
  for (const f of PAELLA_VALENCIANA_TABLA) {
    if (s <= f.serv) { mejor = f; break; }
    mejor = f;
  }
  return mejor;
}
function formatoES(n, dec=2){
  return Number(n).toLocaleString('es-ES', {maximumFractionDigits: dec});
}

function updateCalc(){if(!current)return;let s=Math.max(1,Math.min(+(document.getElementById('serv').max||100),+(document.getElementById('serv').value||1)));document.getElementById('serv').value=s;document.getElementById('diam').value=diamFor(s);let heat=document.getElementById('heat').value;let ratio=current.heat?.[heat]||0;let riceQty=(current.ing.find(i=>/Arroz|Fideo/.test(i[0]))||[null,100])[1]*s;let caldo=ratio?`Caldo/agua orientativo: ${fmt(riceQty*ratio,'ml')} (${ratio} partes por parte de arroz).`:"Guiso: cubrir ingredientes y controlar evaporación.";if(current.heat?.total)caldo+=` Agua total paella: ${fmt(riceQty*current.heat.total,'ml')}.`;document.getElementById('tech').innerHTML=`Raciones: <b>${s}</b>. Fuente: <b>${heat==='gas'?'Gas':'Leña'}</b>. Diámetro: <b>${diamFor(s)}</b>. ${caldo}<br>Azafrán aplicado: <b>4 hebras por cada 100 g de arroz</b>, salvo recetas con proporción propia.`;document.getElementById('ings').innerHTML=current.ing.map(i=>`<tr><td>${i[0]}</td><td>${fmt(i[1]*s,i[2])}</td></tr>`).join('')+(ratio?`<tr><td><b>${current.cat.includes('al horno')?'Caldo/agua':'Fumet / caldo / agua'}</b></td><td><b>${fmt(riceQty*ratio,'ml')}</b></td></tr>`:'');let steps=current.steps||baseSteps(current.title);document.getElementById('steps').innerHTML=steps.map(st=>`<div class="step"><div><b>${st.t}</b><span>${st.x}</span></div></div>`).join('');let tips=["Pesa los ingredientes antes de empezar: el arroz no espera.","Prueba siempre el caldo antes de añadir el arroz y rectifica de sal.","En arroces secos, una vez repartido el arroz, no lo remuevas.","Con leña conviene tener caldo caliente de reserva por la evaporación."];if(current.title.includes('Bogavante'))tips.unshift('Para la versión seca usa 3 partes de fumet por parte de arroz y no remuevas.');if(current.title.includes('A Banda'))tips.unshift('Sirve con allioli: ajo, huevo, aceite suave, sal y unas gotas de limón.');document.getElementById('tips').innerHTML=tips.map(t=>`<li>${t}</li>`).join('')
  // Corrección oficial de la tabla de Paella Valenciana indicada por Eduardo
  try {
    const nombreReceta = (r.nombre || r.name || r.titulo || r.title || '').toLowerCase();
    if (nombreReceta.includes('paella valenciana')) {
      const f = filaPaellaValenciana(serv);
      const diamEls = document.querySelectorAll('[data-diametro], #diametro, .diametro');
      diamEls.forEach(el => el.textContent = f.diam + ' cm');
      const info = document.getElementById('techInfo') || document.getElementById('ficha') || document.querySelector('.ficha-tecnica');
      if (info && !info.dataset.paellaTabla) {
        const div = document.createElement('div');
        div.className = 'tabla-paella-oficial';
        div.innerHTML = '<h3>Tabla oficial Paella Valenciana</h3><p>Para ' + f.serv + ' comensales: paella ' + f.diam + ' cm · arroz ' + formatoES(f.arrozKg,2) + ' kg · agua ' + formatoES(f.aguaL,2) + ' L.</p>';
        info.appendChild(div);
        info.dataset.paellaTabla = '1';
      }
      const ing = document.getElementById('ingredients') || document.getElementById('ingredientes') || document.querySelector('.ingredients');
      if (ing) {
        ing.innerHTML = [
          ['Aceite', formatoES(f.aceiteL,2) + ' L'],
          ['Sal', formatoES(f.salG,0) + ' g'],
          ['Pollo', formatoES(f.polloKg,2) + ' kg'],
          ['Conejo', formatoES(f.conejoKg,2) + ' kg'],
          ['Tomate', formatoES(f.tomateKg,2) + ' kg'],
          ['Caracoles', formatoES(f.caracoles,0) + ' unid.'],
          ['Pimentón', formatoES(f.pimentonG,1) + ' g'],
          ['Agua', formatoES(f.aguaL,2) + ' L'],
          ['Ferraura', formatoES(f.ferrauraKg,2) + ' kg'],
          ['Garrofón', formatoES(f.garrofonKg,2) + ' kg'],
          ['Tavella', formatoES(f.tavellaKg,2) + ' kg'],
          ['Azafrán', formatoES(f.azafranG,1) + ' g'],
          ['Arroz', formatoES(f.arrozKg,2) + ' kg']
        ].map(x => '<div class="ing-row"><span>'+x[0]+'</span><strong>'+x[1]+'</strong></div>').join('');
      }
    }
  } catch(e) {}

}
